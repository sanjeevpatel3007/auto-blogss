# ─────────────────────────────────────────────────────────────
# blog-generator.yml
# GitHub Actions Workflow — Auto AI Blog Generator
#
# Runs every 10 minutes, generates a blog post with AI,
# and commits the new Markdown file back to the repository.
# ─────────────────────────────────────────────────────────────

name: Auto AI Blog Generator

on:
  # ── Scheduled trigger: every 10 minutes ──────────────────
  schedule:
    - cron: "*/10 * * * *"

  # ── Manual trigger from GitHub Actions UI ────────────────
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-blog:
    name: Generate & Commit Blog Post
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      # ── 1. Check out the repository ────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ─────────────────────────────
      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ──────────────────────
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run the blog generator ────────────────────
      - name: Generate Blog Post
        id: generate
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set +e
          python scripts/generate_blog.py 2>&1 | tee /tmp/blog_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if grep -q "NEW_BLOG_CREATED=true" /tmp/blog_output.txt; then
            echo "new_blog=true" >> $GITHUB_OUTPUT
          else
            echo "new_blog=false" >> $GITHUB_OUTPUT
          fi

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::warning::Blog generator exited with code $EXIT_CODE"
          fi

      # ── 5. Commit & push (only if new file was created) ──
      - name: Commit and Push Blog
        if: steps.generate.outputs.new_blog == 'true'
        run: |
          GIT_NAME="${{ secrets.GIT_USER_NAME }}"
          GIT_EMAIL="${{ secrets.GIT_USER_EMAIL }}"
          git config --global user.name "${GIT_NAME:-github-actions[bot]}"
          git config --global user.email "${GIT_EMAIL:-github-actions[bot]@users.noreply.github.com}"

          git add blogs/

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
          git commit -m "bot: Auto Blog: New post generated -- $TIMESTAMP"

          git push origin HEAD:${{ github.ref_name }}

      # ── 6. Skip notice (no new file) ───────────────────
      - name: No New Blog
        if: steps.generate.outputs.new_blog != 'true'
        run: echo "No new blog post was generated this run. Skipping commit."
